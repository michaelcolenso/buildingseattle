name = "buildingseattle"
main = "worker.js"
compatibility_date = "2026-03-14"

[triggers]
crons = ["0 13 * * *"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "buildingseattle"
database_id = "e065e988-045f-42b5-b47a-4027c2e5c417"  # Replace with your actual ID from Dashboard

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["alerts@buildingseattle.com"]
